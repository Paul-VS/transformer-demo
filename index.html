<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Transformer Block Demo</title>
<style>
:root{font-family:system-ui,-apple-system,Segoe UI,sans-serif;color-scheme:dark;--bg:#08111f;--card:#101b2f;--card2:#172741;--text:#f2f7ff;--muted:#a9b9d8;--accent:#7dd3fc;--line:#2d4368;--good:#a7f3d0}*{box-sizing:border-box}html,body{height:100%;overflow:hidden}body{margin:0;background:radial-gradient(circle at top left,#164e63,transparent 24rem),var(--bg);color:var(--text);line-height:1.25}.page{height:100svh;display:grid;grid-template-rows:auto 1fr auto;gap:.55rem;padding:.7rem;max-width:980px;margin:auto}header{min-height:0}h1{font-size:clamp(1.65rem,8.5vw,3.6rem);line-height:.88;margin:.15rem 0;letter-spacing:-.07em}.sub{color:var(--muted);font-size:clamp(.78rem,2.8vw,.98rem);margin:.1rem 0 0;max-width:44rem}.kicker{color:var(--accent);font-weight:850;font-size:.68rem;text-transform:uppercase;letter-spacing:.08em}.app{min-height:0;background:#0f1a2e;border:1px solid #ffffff14;border-radius:1rem;overflow:hidden;box-shadow:0 20px 50px #0006;display:grid;grid-template-rows:auto 1fr}.panel{padding:.7rem;border-bottom:1px solid #ffffff14}.step-head{display:flex;justify-content:space-between;gap:.5rem;align-items:center}.count{color:var(--accent);font-weight:850;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em}h2{margin:.22rem 0;font-size:clamp(1rem,4.4vw,1.45rem)}.explain{color:var(--muted);margin:0;font-size:clamp(.78rem,3.15vw,.95rem)}.diagram{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-top:.55rem}.node{border:1px solid var(--line);border-radius:.65rem;padding:.45rem;background:#ffffff0a;color:var(--muted);font-size:.76rem}.node strong{color:var(--text)}.attention{display:grid;gap:.3rem;margin-top:.45rem}.row{display:grid;grid-template-columns:3.2rem 1fr 2.2rem;gap:.35rem;align-items:center;font-size:.76rem}.bar{height:.5rem;border-radius:99px;background:#ffffff14;overflow:hidden}.fill{height:100%;width:var(--w);background:linear-gradient(90deg,var(--accent),var(--good))}.vectors{min-height:0;display:grid;gap:.45rem;padding:.65rem;align-content:start}.token{background:var(--card2);border:1px solid #ffffff14;border-radius:.8rem;padding:.5rem}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem;gap:.35rem}.word{font-weight:900}.tag{font-size:.66rem;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:.1rem .35rem}.vec{display:grid;grid-template-columns:repeat(4,1fr);gap:.25rem}.cell{min-height:1.65rem;border-radius:.5rem;background:#ffffff12;border:1px solid #ffffff14;display:grid;place-items:center;font-variant-numeric:tabular-nums;font-weight:850;font-size:.8rem}.changed{background:#7dd3fc26;border-color:#7dd3fc99}.controls{display:grid;gap:.45rem}.progress{display:grid;grid-template-columns:repeat(7,1fr);gap:.25rem}.pill{height:.3rem;border-radius:99px;background:#ffffff22}.pill.on{background:var(--accent)}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}button{border:0;border-radius:.8rem;padding:.7rem;font-weight:900;background:var(--accent);color:#07111f}button.secondary{background:#ffffff14;color:var(--text);border:1px solid #ffffff1f}.note{color:var(--muted);font-size:.74rem;margin:0;text-align:center}code{background:#ffffff12;color:var(--good);padding:.08rem .2rem;border-radius:.25rem}@media(max-height:720px){.sub{display:none}.diagram{display:none}.panel{padding:.58rem}.vectors{padding:.5rem}.token{padding:.42rem}.cell{min-height:1.45rem}.note{display:none}button{padding:.6rem}}@media(max-height:610px){h1{font-size:1.45rem}.explain{font-size:.72rem}.attention .node{display:none}.token:nth-child(1){display:none}.vectors{grid-template-columns:1fr 1fr}.cell{min-height:1.25rem;font-size:.72rem}}@media(min-width:720px){.page{padding:1rem}.app{grid-template-columns:.9fr 1.1fr;grid-template-rows:1fr}.panel{border-bottom:0;border-right:1px solid #ffffff14}.vectors{grid-template-columns:repeat(3,1fr);align-content:center}.cell{min-height:2rem}.note{font-size:.85rem}}
</style>
</head>
<body>
<div class="page">
<header><div class="kicker">Tiny transformer block</div><h1>Watch vectors move.</h1><p class="sub">One-screen walkthrough: norm → attention → residual → norm → MLP → residual.</p></header>
<main class="app" aria-live="polite"><section class="panel"><div class="step-head"><div class="count" id="count"></div><div class="kicker" id="mini"></div></div><h2 id="title"></h2><p class="explain" id="explain"></p><div class="diagram" id="diagram"></div><div class="attention" id="attention"></div></section><section class="vectors" id="vectors"></section></main>
<section class="controls"><div class="progress" id="progress"></div><div class="buttons"><button class="secondary" id="prev">Back</button><button id="next">Next</button></div><p class="note">Block formula: <code>x = x + attention(norm(x))</code>, then <code>x = x + MLP(norm(x))</code></p></section>
</div>
<script>
const words=["The","cat","sat"];
const steps=[
{t:"Start with token vectors",e:"Each token becomes a vector. Real LLM vectors have thousands of values; this toy uses 4.",tag:"Embedding",v:[[.20,.10,-.30,.50],[.70,-.20,.40,.10],[-.10,.60,.20,-.40]],d:["<strong>Text</strong><br>The cat sat","<strong>Embedding</strong><br>IDs become vectors"]},
{t:"Norm stabilizes values",e:"Normalization keeps scale controlled before attention sees the vectors.",tag:"After norm",v:[[.10,.00,-.70,1.00],[1.10,-.90,.40,-.20],[-.50,1.20,.30,-1.00]],d:["<strong>Norm</strong><br>cleaner scale","<strong>No mixing</strong><br>one vector per token"]},
{t:"Attention makes tokens talk",e:"The last token asks which earlier tokens matter. Here, “sat” attends mostly to “cat”.",tag:"Attention input",v:[[.10,.00,-.70,1.00],[1.10,-.90,.40,-.20],[-.50,1.20,.30,-1.00]],a:[["The",10],["cat",75],["sat",15]],d:["<strong>Q/K/V</strong><br>query, key, value","<strong>Softmax</strong><br>scores → weights"]},
{t:"Attention creates update",e:"The attention weights mix value vectors into a new update for each token.",tag:"Attn update",v:[[.05,.03,-.10,.08],[.20,-.05,.15,.04],[.30,-.10,.50,.20]],d:["<strong>Weighted sum</strong><br>copy useful info","<strong>Projection</strong><br>back to size"]},
{t:"Residual keeps original",e:"The update is added onto the old vector. It is an edit, not a rewrite.",tag:"After add",v:[[.25,.13,-.40,.58],[.90,-.25,.55,.14],[.20,.50,.70,-.20]],d:["<strong>Residual</strong><br>old + update","<strong>Context</strong><br>tokens shared info"]},
{t:"MLP refines each token",e:"The MLP processes each token independently. No token-to-token mixing here.",tag:"MLP update",v:[[.02,.10,-.08,.10],[-.15,.20,.05,-.02],[.10,.20,-.40,.30]],d:["<strong>MLP</strong><br>expand → shrink","<strong>Per token</strong><br>each row alone"]},
{t:"Block output",e:"The MLP update is added back. This goes to the next block, or to prediction if it is the last block.",tag:"Output",v:[[.27,.23,-.48,.68],[.75,-.05,.60,.12],[.30,.70,.30,.10]],d:["<strong>Output</strong><br>improved vectors","<strong>Next</strong><br>another block"]}
];
let step=0,prev=null;const el={count:document.getElementById('count'),mini:document.getElementById('mini'),title:document.getElementById('title'),explain:document.getElementById('explain'),vectors:document.getElementById('vectors'),diagram:document.getElementById('diagram'),attention:document.getElementById('attention'),progress:document.getElementById('progress'),prev:document.getElementById('prev'),next:document.getElementById('next')};
const fmt=n=>(n>=0?'+':'')+n.toFixed(2);
function render(){const s=steps[step];el.count.textContent=`Step ${step+1}/${steps.length}`;el.mini.textContent=s.tag;el.title.textContent=s.t;el.explain.textContent=s.e;el.vectors.innerHTML=s.v.map((vec,i)=>`<article class="token"><div class="top"><div class="word">${words[i]}</div><div class="tag">${s.tag}</div></div><div class="vec">${vec.map((x,j)=>`<div class="cell ${prev&&Math.abs(x-prev[i][j])>.001?'changed':''}">${fmt(x)}</div>`).join('')}</div></article>`).join('');el.diagram.innerHTML=s.d.map(x=>`<div class="node">${x}</div>`).join('');el.attention.innerHTML=s.a?s.a.map(([name,p])=>`<div class="row"><strong>${name}</strong><div class="bar"><div class="fill" style="--w:${p}%"></div></div><span>${p}%</span></div>`).join(''):'';el.progress.innerHTML=steps.map((_,i)=>`<div class="pill ${i<=step?'on':''}"></div>`).join('');el.prev.disabled=step===0;el.next.textContent=step===steps.length-1?'Restart':'Next';prev=s.v}
el.next.onclick=()=>{step=step===steps.length-1?0:step+1;render()};el.prev.onclick=()=>{step=Math.max(0,step-1);render()};render();
</script>
</body>
</html>
