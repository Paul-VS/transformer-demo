<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Transformer Block Demo</title>
<style>
:root{font-family:system-ui,-apple-system,Segoe UI,sans-serif;color-scheme:dark;--bg:#08111f;--card:#101b2f;--card2:#172741;--text:#f2f7ff;--muted:#a9b9d8;--accent:#7dd3fc;--line:#2d4368;--good:#a7f3d0;--hot:#fda4af}*{box-sizing:border-box}html,body{height:100%;overflow:hidden}body{margin:0;background:radial-gradient(circle at top left,#164e63,transparent 24rem),var(--bg);color:var(--text);line-height:1.25}.page{height:100svh;display:grid;grid-template-rows:auto 1fr auto;gap:.55rem;padding:.7rem;max-width:980px;margin:auto}h1{font-size:clamp(1.55rem,8vw,3.4rem);line-height:.88;margin:.12rem 0;letter-spacing:-.07em}.sub{color:var(--muted);font-size:clamp(.76rem,2.7vw,.96rem);margin:.1rem 0 0}.kicker{color:var(--accent);font-weight:850;font-size:.67rem;text-transform:uppercase;letter-spacing:.08em}.app{min-height:0;background:#0f1a2e;border:1px solid #ffffff14;border-radius:1rem;overflow:hidden;box-shadow:0 20px 50px #0006;display:grid;grid-template-rows:auto 1fr}.panel{padding:.65rem;border-bottom:1px solid #ffffff14}.step-head{display:flex;justify-content:space-between;gap:.5rem;align-items:center}.count{color:var(--accent);font-weight:850;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em}h2{margin:.2rem 0;font-size:clamp(1rem,4.2vw,1.42rem)}.explain{color:var(--muted);margin:0;font-size:clamp(.76rem,3vw,.93rem)}.diagram{display:grid;grid-template-columns:1fr 1fr;gap:.38rem;margin-top:.5rem}.node{border:1px solid var(--line);border-radius:.62rem;padding:.42rem;background:#ffffff0a;color:var(--muted);font-size:.74rem}.node strong{color:var(--text)}.attention{display:grid;gap:.28rem;margin-top:.42rem}.row{display:grid;grid-template-columns:3.1rem 1fr 2.2rem;gap:.32rem;align-items:center;font-size:.74rem}.bar{height:.5rem;border-radius:99px;background:#ffffff14;overflow:hidden}.fill{height:100%;width:var(--w);background:linear-gradient(90deg,var(--accent),var(--good))}.workspace{min-height:0;display:grid;gap:.42rem;padding:.6rem;align-content:start}.token,.qkv-card{background:var(--card2);border:1px solid #ffffff14;border-radius:.78rem;padding:.48rem}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.32rem;gap:.35rem}.word{font-weight:900}.tag{font-size:.64rem;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:.08rem .32rem}.vec{display:grid;grid-template-columns:repeat(4,1fr);gap:.24rem}.vec.small{grid-template-columns:repeat(2,1fr)}.cell{min-height:1.55rem;border-radius:.48rem;background:#ffffff12;border:1px solid #ffffff14;display:grid;place-items:center;font-variant-numeric:tabular-nums;font-weight:850;font-size:.78rem}.changed{background:#7dd3fc26;border-color:#7dd3fc99}.qkv{display:grid;grid-template-columns:repeat(3,1fr);gap:.42rem}.qkv-card{min-width:0}.qkv-card .tag{border-color:#ffffff24}.q{color:var(--accent)}.k{color:var(--good)}.v{color:var(--hot)}.mathline{font-size:.76rem;color:var(--muted);background:#ffffff0a;border:1px solid #ffffff12;border-radius:.65rem;padding:.48rem}.controls{display:grid;gap:.43rem}.progress{display:grid;grid-template-columns:repeat(8,1fr);gap:.23rem}.pill{height:.3rem;border-radius:99px;background:#ffffff22}.pill.on{background:var(--accent)}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}button{border:0;border-radius:.8rem;padding:.68rem;font-weight:900;background:var(--accent);color:#07111f}button.secondary{background:#ffffff14;color:var(--text);border:1px solid #ffffff1f}.note{color:var(--muted);font-size:.72rem;margin:0;text-align:center}code{background:#ffffff12;color:var(--good);padding:.08rem .2rem;border-radius:.25rem}@media(max-height:730px){.sub{display:none}.diagram{display:none}.panel{padding:.55rem}.workspace{padding:.48rem}.token,.qkv-card{padding:.4rem}.cell{min-height:1.35rem;font-size:.72rem}.note{display:none}button{padding:.56rem}.mathline{font-size:.69rem;padding:.38rem}}@media(max-height:620px){h1{font-size:1.38rem}.explain{font-size:.7rem}.attention .node{display:none}.token:nth-child(1){display:none}.workspace{grid-template-columns:1fr 1fr}.qkv{grid-column:1/-1}.cell{min-height:1.18rem}.qkv-card{padding:.34rem}.mathline{display:none}}@media(min-width:720px){.page{padding:1rem}.app{grid-template-columns:.92fr 1.08fr;grid-template-rows:1fr}.panel{border-bottom:0;border-right:1px solid #ffffff14}.workspace{grid-template-columns:repeat(3,1fr);align-content:center}.qkv,.mathline{grid-column:1/-1}.cell{min-height:1.95rem}.note{font-size:.84rem}}
</style>
</head>
<body>
<div class="page">
<header><div class="kicker">Tiny transformer block</div><h1>Watch vectors move.</h1><p class="sub">One-screen walkthrough: norm → Q/K/V → weights → value mix → residual → MLP.</p></header>
<main class="app" aria-live="polite"><section class="panel"><div class="step-head"><div class="count" id="count"></div><div class="kicker" id="mini"></div></div><h2 id="title"></h2><p class="explain" id="explain"></p><div class="diagram" id="diagram"></div><div class="attention" id="attention"></div></section><section class="workspace" id="workspace"></section></main>
<section class="controls"><div class="progress" id="progress"></div><div class="buttons"><button class="secondary" id="prev">Back</button><button id="next">Next</button></div><p class="note">Attention path: <code>norm(x) → Q,K,V → weights × V → attention update → x + update</code></p></section>
</div>
<script>
const words=["The","cat","sat"];
const base=[[.20,.10,-.30,.50],[.70,-.20,.40,.10],[-.10,.60,.20,-.40]];
const norm=[[.10,.00,-.70,1.00],[1.10,-.90,.40,-.20],[-.50,1.20,.30,-1.00]];
const attnUpdate=[[.05,.03,-.10,.08],[.20,-.05,.15,.04],[.30,-.10,.50,.20]];
const afterAttn=[[.25,.13,-.40,.58],[.90,-.25,.55,.14],[.20,.50,.70,-.20]];
const mlpUpdate=[[.02,.10,-.08,.10],[-.15,.20,.05,-.02],[.10,.20,-.40,.30]];
const output=[[.27,.23,-.48,.68],[.75,-.05,.60,.12],[.30,.70,.30,.10]];
const qkv={q:[[.10,.30],[.70,-.40],[.40,-.20]],k:[[.20,-.50],[.80,.20],[-.10,.80]],v:[[.40,.10],[.90,-.30],[.30,-.60]]};
const steps=[
{kind:'vec',t:'Start with token vectors',e:'Each token becomes a vector. Real LLM vectors have thousands of values; this toy uses 4.',tag:'Embedding',v:base,d:['<strong>Text</strong><br>The cat sat','<strong>Embedding</strong><br>IDs become vectors']},
{kind:'vec',t:'Norm stabilizes values',e:'Normalization keeps scale controlled before attention sees the vectors.',tag:'After norm',v:norm,d:['<strong>Norm</strong><br>cleaner scale','<strong>No mixing</strong><br>one vector per token']},
{kind:'qkv',t:'Project into Q, K, and V',e:'The normalized vectors are multiplied by three learned matrices. Same input, three different views: Query asks, Key matches, Value carries information.',tag:'Q/K/V',v:norm,d:['<strong>Q = xWq</strong><br>what am I looking for?','<strong>K = xWk</strong><br>what do I match?','<strong>V = xWv</strong><br>what info can I send?']},
{kind:'weights',t:'Q matches K to get weights',e:'For “sat”, its Query is compared with each Key. Softmax turns those scores into attention percentages.',tag:'Weights',v:norm,a:[["The",10],["cat",75],["sat",15]],d:['<strong>sat Q</strong><br>compared with all K vectors','<strong>Softmax</strong><br>scores become weights']},
{kind:'vec',t:'Weights mix V, then project back',e:'The weights blend the Value vectors. That smaller attention result is projected back into a normal 4-value update.',tag:'Attn update',v:attnUpdate,math:'sat update ≈ 0.10×V(The) + 0.75×V(cat) + 0.15×V(sat) → projected back to 4 values',d:['<strong>weights × V</strong><br>copy useful info','<strong>Output projection</strong><br>return to vector size']},
{kind:'vec',t:'Residual adds the update',e:'Now the attention update is added to the original pre-attention vector. This is where attention is re-integrated.',tag:'x + attn',v:afterAttn,math:'sat: [-0.10,+0.60,+0.20,-0.40] + [+0.30,-0.10,+0.50,+0.20] = [+0.20,+0.50,+0.70,-0.20]',d:['<strong>Residual</strong><br>old vector + attention update','<strong>Result</strong><br>tokens now contain shared context']},
{kind:'vec',t:'MLP refines each token',e:'The MLP processes each token independently. No token-to-token mixing here.',tag:'MLP update',v:mlpUpdate,d:['<strong>MLP</strong><br>expand → activate → shrink','<strong>Per token</strong><br>each row alone']},
{kind:'vec',t:'Second residual gives output',e:'The MLP update is added back. This block output goes to the next transformer block, or to prediction if this is the last block.',tag:'Output',v:output,d:['<strong>Block output</strong><br>improved vectors','<strong>Next</strong><br>another block in series']}
];
let step=0,prev=null;const el={count:document.getElementById('count'),mini:document.getElementById('mini'),title:document.getElementById('title'),explain:document.getElementById('explain'),workspace:document.getElementById('workspace'),diagram:document.getElementById('diagram'),attention:document.getElementById('attention'),progress:document.getElementById('progress'),prev:document.getElementById('prev'),next:document.getElementById('next')};
const fmt=n=>(n>=0?'+':'')+n.toFixed(2);
function vecCards(v,tag){return v.map((vec,i)=>`<article class="token"><div class="top"><div class="word">${words[i]}</div><div class="tag">${tag}</div></div><div class="vec">${vec.map((x,j)=>`<div class="cell ${prev&&prev[i]&&Math.abs(x-prev[i][j])>.001?'changed':''}">${fmt(x)}</div>`).join('')}</div></article>`).join('')}
function qkvCards(){return `<div class="qkv">${['q','k','v'].map(type=>`<article class="qkv-card"><div class="top"><div class="word ${type}">${type.toUpperCase()}</div><div class="tag">2 values each</div></div>${qkv[type].map((vec,i)=>`<div class="top"><span>${words[i]}</span><div class="vec small">${vec.map(x=>`<div class="cell">${fmt(x)}</div>`).join('')}</div></div>`).join('')}</article>`).join('')}</div><div class="mathline">Each token now has three smaller views: Q decides what to search for, K decides what matches, V contains the information to copy.</div>`}
function render(){const s=steps[step];el.count.textContent=`Step ${step+1}/${steps.length}`;el.mini.textContent=s.tag;el.title.textContent=s.t;el.explain.textContent=s.e;el.workspace.innerHTML=s.kind==='qkv'?qkvCards():vecCards(s.v,s.tag)+(s.math?`<div class="mathline">${s.math}</div>`:'');el.diagram.innerHTML=(s.d||[]).map(x=>`<div class="node">${x}</div>`).join('');el.attention.innerHTML=s.a?s.a.map(([name,p])=>`<div class="row"><strong>${name}</strong><div class="bar"><div class="fill" style="--w:${p}%"></div></div><span>${p}%</span></div>`).join(''):'';el.progress.innerHTML=steps.map((_,i)=>`<div class="pill ${i<=step?'on':''}"></div>`).join('');el.prev.disabled=step===0;el.next.textContent=step===steps.length-1?'Restart':'Next';prev=s.kind==='vec'?s.v:null}
el.next.onclick=()=>{step=step===steps.length-1?0:step+1;render()};el.prev.onclick=()=>{step=Math.max(0,step-1);render()};render();
</script>
</body>
</html>
