<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Transformer Block Demo</title><style>
:root{font-family:system-ui,-apple-system,Segoe UI,sans-serif;color-scheme:dark;--bg:#08111f;--card:#101b2f;--card2:#172741;--text:#f2f7ff;--muted:#a9b9d8;--accent:#7dd3fc;--line:#2d4368;--good:#a7f3d0;--hot:#fda4af}*{box-sizing:border-box}html,body{height:100%;overflow:hidden}body{margin:0;background:radial-gradient(circle at top left,#164e63,transparent 24rem),var(--bg);color:var(--text);line-height:1.25}.page{height:100svh;display:grid;grid-template-rows:auto 1fr auto;gap:.45rem;padding:.65rem;max-width:980px;margin:auto}h1{font-size:clamp(1.35rem,7vw,3rem);line-height:.9;margin:.08rem 0;letter-spacing:-.06em}.sub{color:var(--muted);font-size:clamp(.72rem,2.5vw,.9rem);margin:.05rem 0}.kicker,.count{color:var(--accent);font-weight:850;font-size:.65rem;text-transform:uppercase;letter-spacing:.08em}.app{min-height:0;background:#0f1a2e;border:1px solid #ffffff14;border-radius:.95rem;overflow:hidden;box-shadow:0 18px 45px #0006;display:grid;grid-template-rows:auto 1fr}.panel{padding:.55rem;border-bottom:1px solid #ffffff14}.step-head{display:flex;justify-content:space-between;gap:.5rem;align-items:center}h2{margin:.16rem 0;font-size:clamp(.96rem,4vw,1.32rem)}.explain{color:var(--muted);margin:0;font-size:clamp(.72rem,2.8vw,.88rem)}.diagram{display:grid;grid-template-columns:1fr 1fr;gap:.32rem;margin-top:.42rem}.node,.mathline{border:1px solid var(--line);border-radius:.58rem;padding:.36rem;background:#ffffff0a;color:var(--muted);font-size:.7rem}.node strong{color:var(--text)}.workspace{min-height:0;display:grid;gap:.36rem;padding:.5rem;align-content:start}.token,.mini-card{background:var(--card2);border:1px solid #ffffff14;border-radius:.72rem;padding:.4rem}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.28rem;gap:.3rem}.word{font-weight:900}.tag{font-size:.6rem;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:.06rem .28rem}.vec{display:grid;grid-template-columns:repeat(4,1fr);gap:.2rem}.vec.two{grid-template-columns:repeat(2,1fr)}.vec.three{grid-template-columns:repeat(3,1fr)}.cell{min-height:1.38rem;border-radius:.42rem;background:#ffffff12;border:1px solid #ffffff14;display:grid;place-items:center;font-variant-numeric:tabular-nums;font-weight:850;font-size:.72rem}.changed{background:#7dd3fc26;border-color:#7dd3fc99}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:.34rem}.accent{color:var(--accent)}.good{color:var(--good)}.hot{color:var(--hot)}.controls{display:grid;gap:.35rem}.progress{display:grid;grid-template-columns:repeat(11,1fr);gap:.18rem}.pill{height:.27rem;border-radius:99px;background:#ffffff22}.pill.on{background:var(--accent)}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:.45rem}button{border:0;border-radius:.72rem;padding:.58rem;font-weight:900;background:var(--accent);color:#07111f}button.secondary{background:#ffffff14;color:var(--text);border:1px solid #ffffff1f}.note{color:var(--muted);font-size:.68rem;margin:0;text-align:center}code{background:#ffffff12;color:var(--good);padding:.06rem .18rem;border-radius:.22rem}@media(max-height:730px){.sub,.diagram,.note{display:none}.panel{padding:.48rem}.workspace{padding:.42rem}.token,.mini-card{padding:.34rem}.cell{min-height:1.18rem;font-size:.66rem}button{padding:.5rem}.mathline{font-size:.65rem;padding:.32rem}}@media(max-height:610px){h1{font-size:1.18rem}.explain{font-size:.66rem}.workspace{grid-template-columns:1fr 1fr}.grid3,.mathline{grid-column:1/-1}.cell{min-height:1.05rem}.token:nth-child(1){display:none}}@media(min-width:720px){.page{padding:.9rem}.app{grid-template-columns:.9fr 1.1fr;grid-template-rows:1fr}.panel{border-bottom:0;border-right:1px solid #ffffff14}.workspace{grid-template-columns:repeat(3,1fr);align-content:center}.grid3,.mathline{grid-column:1/-1}.cell{min-height:1.72rem}.note{font-size:.78rem}}
</style></head><body><div class="page"><header><div class="kicker">Tiny transformer block</div><h1>Watch vectors move.</h1><p class="sub">Expanded attention path: norm → Q/K/V → QK scores → softmax → weighted V → output projection → residual.</p></header><main class="app" aria-live="polite"><section class="panel"><div class="step-head"><div class="count" id="count"></div><div class="kicker" id="mini"></div></div><h2 id="title"></h2><p class="explain" id="explain"></p><div class="diagram" id="diagram"></div></section><section class="workspace" id="workspace"></section></main><section class="controls"><div class="progress" id="progress"></div><div class="buttons"><button class="secondary" id="prev">Back</button><button id="next">Next</button></div><p class="note"><code>norm(x) → Q,K,V → QKᵀ → softmax → weights×V → Wo → x + update</code></p></section></div><script>
const words=['The','cat','sat'];
const base=[[.20,.10,-.30,.50],[.70,-.20,.40,.10],[-.10,.60,.20,-.40]];
const norm=[[.10,.00,-.70,1.00],[1.10,-.90,.40,-.20],[-.50,1.20,.30,-1.00]];
const q=[[.10,.30],[.70,-.40],[.40,-.20]], k=[[.20,-.50],[.80,.20],[-.10,.80]], v=[[.40,.10],[.90,-.30],[.30,-.60]];
const scores=[.18,.28,-.20], weights=[.32,.35,.33], weightedV=[[.13,.03],[.32,-.11],[.10,-.20]], mixedV=[.55,-.28], attnUpdate=[[.05,.03,-.10,.08],[.20,-.05,.15,.04],[.30,-.10,.50,.20]];
const afterAttn=[[.25,.13,-.40,.58],[.90,-.25,.55,.14],[.20,.50,.70,-.20]], mlpUpdate=[[.02,.10,-.08,.10],[-.15,.20,.05,-.02],[.10,.20,-.40,.30]], output=[[.27,.23,-.48,.68],[.75,-.05,.60,.12],[.30,.70,.30,.10]];
const steps=[
{kind:'vec',t:'Start with token vectors',e:'Each token starts as a vector. This toy uses 4 values instead of thousands.',tag:'Embedding',v:base,d:['<strong>Input</strong><br>The cat sat','<strong>Shape</strong><br>3 tokens × 4 values']},
{kind:'vec',t:'Normalize before attention',e:'Norm changes the scale of each token vector before the attention calculations.',tag:'norm(x)',v:norm,d:['<strong>Input to attention</strong><br>still 3 token vectors','<strong>No token mixing yet</strong><br>just rescaled values']},
{kind:'qkv',t:'Create Q, K, and V vectors',e:'The same normalized vectors are multiplied by three different learned matrices. This creates three separate 2-value vectors per token.',tag:'Q K V',d:['<strong>Q = xWq</strong><br>used in score calculation','<strong>K = xWk</strong><br>used in score calculation','<strong>V = xWv</strong><br>used in weighted sum']},
{kind:'single',t:'Use sat’s Q against all K vectors',e:'Focus on one output position: sat. Its Q vector is dot-multiplied with The/K, cat/K, and sat/K.',tag:'QK dots',items:[['Q_sat',[.40,-.20]],['K_The',[.20,-.50]],['K_cat',[.80,.20]],['K_sat',[-.10,.80]]],math:'Dot products: Q_sat·K_The = +0.18, Q_sat·K_cat = +0.28, Q_sat·K_sat = -0.20'},
{kind:'bars',t:'Scores become softmax weights',e:'The raw QK scores are converted into coefficients that add up to 1.',tag:'softmax',bars:[['The',32],['cat',35],['sat',33]],items:[['scores',scores],['weights',weights]],math:'softmax([+0.18,+0.28,-0.20]) ≈ [0.32,0.35,0.33]'},
{kind:'single',t:'Weights scale the V vectors',e:'Each V vector is multiplied by its weight. These scaled vectors are the actual pieces that get added together.',tag:'weights × V',items:[['.32×V_The',weightedV[0]],['.35×V_cat',weightedV[1]],['.33×V_sat',weightedV[2]]],math:'The values are now scaled contributions, not attention scores.'},
{kind:'single',t:'Scaled V vectors are summed',e:'The scaled V vectors are added to produce one mixed attention result for sat.',tag:'sum',items:[['mixed V for sat',mixedV]],math:'[+0.13,+0.03] + [+0.32,-0.11] + [+0.10,-0.20] = [+0.55,-0.28]'},
{kind:'vec',t:'Project back to model size',e:'The mixed attention result is projected from the small head size back to the normal 4-value token-vector size.',tag:'Attn update',v:attnUpdate,math:'For sat: [+0.55,-0.28] × Wo = [+0.30,-0.10,+0.50,+0.20]',d:['<strong>Head output</strong><br>2 values','<strong>Output projection</strong><br>back to 4 values']},
{kind:'vec',t:'Residual add re-integrates attention',e:'The attention update is added to the original pre-attention vector.',tag:'x + attn',v:afterAttn,math:'sat: [-0.10,+0.60,+0.20,-0.40] + [+0.30,-0.10,+0.50,+0.20] = [+0.20,+0.50,+0.70,-0.20]',d:['<strong>Residual</strong><br>old vector + update','<strong>Result</strong><br>attention integrated']},
{kind:'vec',t:'MLP creates another update',e:'The MLP transforms each token independently. No token-to-token mixing happens here.',tag:'MLP update',v:mlpUpdate,d:['<strong>MLP</strong><br>expand → activate → shrink','<strong>Per token</strong><br>same operation per row']},
{kind:'vec',t:'Final residual gives block output',e:'The MLP update is added back. This output goes to the next transformer block.',tag:'Output',v:output,d:['<strong>Block output</strong><br>updated vectors','<strong>Next</strong><br>another block in series']}
];
let step=0,prev=null;const el={count:document.getElementById('count'),mini:document.getElementById('mini'),title:document.getElementById('title'),explain:document.getElementById('explain'),workspace:document.getElementById('workspace'),diagram:document.getElementById('diagram'),progress:document.getElementById('progress'),prev:document.getElementById('prev'),next:document.getElementById('next')};
const fmt=n=>(n>=0?'+':'')+Number(n).toFixed(2);
function cells(arr,cls=''){return `<div class="vec ${cls}">${arr.map(x=>`<div class="cell">${fmt(x)}</div>`).join('')}</div>`}
function vecCards(v,tag){return v.map((vec,i)=>`<article class="token"><div class="top"><div class="word">${words[i]}</div><div class="tag">${tag}</div></div><div class="vec">${vec.map((x,j)=>`<div class="cell ${prev&&prev[i]&&Math.abs(x-prev[i][j])>.001?'changed':''}">${fmt(x)}</div>`).join('')}</div></article>`).join('')}
function qkvCards(){return `<div class="grid3">${[['Q',q,'accent'],['K',k,'good'],['V',v,'hot']].map(([name,data,cls])=>`<article class="mini-card"><div class="top"><div class="word ${cls}">${name}</div><div class="tag">3×2</div></div>${data.map((vec,i)=>`<div class="top"><span>${words[i]}</span>${cells(vec,'two')}</div>`).join('')}</article>`).join('')}</div><div class="mathline">Same norm(x), three learned projections. Q and K feed the score calculation; V feeds the later weighted sum.</div>`}
function itemCards(items){return items.map(([name,arr])=>`<article class="mini-card"><div class="top"><div class="word">${name}</div><div class="tag">${arr.length} values</div></div>${cells(arr,arr.length===2?'two':arr.length===3?'three':'')}</article>`).join('')}
function barCards(bars){return bars.map(([name,p])=>`<article class="mini-card"><div class="top"><strong>${name}</strong><span>${p}%</span></div><div class="bar"><div class="fill" style="--w:${p}%"></div></div></article>`).join('')}
function render(){const s=steps[step];el.count.textContent=`Step ${step+1}/${steps.length}`;el.mini.textContent=s.tag;el.title.textContent=s.t;el.explain.textContent=s.e;let html='';if(s.kind==='qkv')html=qkvCards();if(s.kind==='vec')html=vecCards(s.v,s.tag);if(s.kind==='single')html=itemCards(s.items);if(s.kind==='bars')html=itemCards(s.items)+barCards(s.bars);if(s.math)html+=`<div class="mathline">${s.math}</div>`;el.workspace.innerHTML=html;el.diagram.innerHTML=(s.d||[]).map(x=>`<div class="node">${x}</div>`).join('');el.progress.innerHTML=steps.map((_,i)=>`<div class="pill ${i<=step?'on':''}"></div>`).join('');el.prev.disabled=step===0;el.next.textContent=step===steps.length-1?'Restart':'Next';prev=s.kind==='vec'?s.v:null}
el.next.onclick=()=>{step=step===steps.length-1?0:step+1;render()};el.prev.onclick=()=>{step=Math.max(0,step-1);render()};render();
</script></body></html>
