<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Transformer Block Demo</title><style>
:root{font-family:system-ui,-apple-system,Segoe UI,sans-serif;color-scheme:dark;--bg:#08111f;--panel:#0f1a2e;--card:#172741;--text:#f2f7ff;--muted:#a9b9d8;--accent:#7dd3fc;--good:#a7f3d0;--hot:#fda4af;--line:#2d4368}*{box-sizing:border-box}html,body{height:100%;overflow:hidden}body{margin:0;background:radial-gradient(circle at top left,#164e63,transparent 24rem),var(--bg);color:var(--text);line-height:1.22}.page{height:100svh;display:grid;grid-template-rows:auto 1fr auto;gap:.42rem;padding:.62rem;max-width:1040px;margin:auto}h1{font-size:clamp(1.35rem,6.4vw,2.9rem);line-height:.9;margin:.05rem 0;letter-spacing:-.055em}.sub{color:var(--muted);font-size:.78rem;margin:.05rem 0}.kicker,.count{color:var(--accent);font-weight:850;font-size:.62rem;text-transform:uppercase;letter-spacing:.08em}.app{min-height:0;background:var(--panel);border:1px solid #ffffff14;border-radius:.95rem;overflow:hidden;display:grid;grid-template-rows:auto 1fr;box-shadow:0 18px 45px #0006}.panel{padding:.52rem;border-bottom:1px solid #ffffff14}.step-head{display:flex;justify-content:space-between;gap:.5rem;align-items:center}h2{margin:.14rem 0;font-size:clamp(.95rem,3.6vw,1.28rem)}.explain{color:var(--muted);margin:0;font-size:clamp(.7rem,2.6vw,.86rem)}.diagram{display:grid;grid-template-columns:1fr 1fr;gap:.3rem;margin-top:.38rem}.node,.mathline{border:1px solid var(--line);border-radius:.55rem;padding:.32rem;background:#ffffff0a;color:var(--muted);font-size:.67rem}.node strong{color:var(--text)}.workspace{min-height:0;display:grid;gap:.33rem;padding:.45rem;align-content:start}.token,.mini{background:var(--card);border:1px solid #ffffff14;border-radius:.68rem;padding:.36rem}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.24rem;gap:.28rem}.word{font-weight:900}.tag{font-size:.58rem;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:.05rem .24rem}.vec{display:grid;grid-template-columns:repeat(4,1fr);gap:.18rem}.vec.two{grid-template-columns:repeat(2,1fr)}.vec.three{grid-template-columns:repeat(3,1fr)}.cell{min-height:1.22rem;border-radius:.38rem;background:#ffffff12;border:1px solid #ffffff14;display:grid;place-items:center;font-variant-numeric:tabular-nums;font-weight:850;font-size:.66rem}.changed{background:#7dd3fc26;border-color:#7dd3fc99}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.32rem}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:.32rem}.accent{color:var(--accent)}.good{color:var(--good)}.hot{color:var(--hot)}.bar{height:.45rem;border-radius:99px;background:#ffffff14;overflow:hidden}.fill{height:100%;width:var(--w);background:linear-gradient(90deg,var(--accent),var(--good))}.controls{display:grid;gap:.34rem}.progress{display:grid;grid-template-columns:repeat(13,1fr);gap:.16rem}.pill{height:.26rem;border-radius:99px;background:#ffffff22}.pill.on{background:var(--accent)}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:.42rem}button{border:0;border-radius:.7rem;padding:.5rem .62rem;font-weight:900;background:var(--accent);color:#07111f}button.secondary{background:#ffffff14;color:var(--text);border:1px solid #ffffff1f}.note{color:var(--muted);font-size:.65rem;margin:0;text-align:center}code{background:#ffffff12;color:var(--good);padding:.05rem .16rem;border-radius:.2rem}@media(max-height:735px){.sub,.diagram,.note{display:none}.page{gap:.32rem}.panel{padding:.42rem}.workspace{padding:.36rem}.token,.mini{padding:.3rem}.cell{min-height:1.05rem;font-size:.61rem}button{padding:.42rem}.mathline{font-size:.62rem;padding:.28rem}}@media(max-height:610px){h1{font-size:1.05rem}.workspace{grid-template-columns:1fr 1fr}.grid2,.grid3,.mathline{grid-column:1/-1}.token:nth-child(1){display:none}.explain{font-size:.63rem}.cell{min-height:.95rem}}@media(min-width:760px){.page{padding:.85rem}.app{grid-template-columns:.88fr 1.12fr;grid-template-rows:1fr}.panel{border-bottom:0;border-right:1px solid #ffffff14}.workspace{grid-template-columns:repeat(3,1fr);align-content:center}.grid2,.grid3,.mathline{grid-column:1/-1}.cell{min-height:1.55rem}.note{font-size:.76rem}}
</style></head><body><div class="page"><header><div class="kicker">Tiny transformer block</div><h1>Watch vectors move.</h1><p class="sub">Guided flow: positional encoding → norm → Q/K/V → QK scores → softmax → weighted V → multi-head output → residual → MLP.</p></header><main class="app"><section class="panel"><div class="step-head"><div class="count" id="count"></div><div class="kicker" id="mini"></div></div><h2 id="title"></h2><p class="explain" id="explain"></p><div class="diagram" id="diagram"></div></section><section class="workspace" id="workspace"></section></main><section class="controls"><div class="progress" id="progress"></div><div class="buttons"><button class="secondary" id="prev">Back</button><button id="next">Next</button></div><p class="note"><code>embedding + position → norm(x) → Q,K,V → QKᵀ → softmax → weights×V → concat heads → Wo → residual → MLP</code></p></section></div><script>
const words=['The','cat','sat'];
const embed=[[.20,.10,-.30,.50],[.70,-.20,.40,.10],[-.10,.60,.20,-.40]];
const pos=[[.00,.05,.00,-.05],[.05,.00,-.05,.00],[.10,-.05,-.10,.05]];
const x0=embed.map((r,i)=>r.map((n,j)=>+(n+pos[i][j]).toFixed(2)));
const norm=[[.10,.00,-.70,1.00],[1.10,-.90,.40,-.20],[-.50,1.20,.30,-1.00]];
const q=[[.10,.30],[.70,-.40],[.40,-.20]], k=[[.20,-.50],[.80,.20],[-.10,.80]], v=[[.40,.10],[.90,-.30],[.30,-.60]];
const headB=[[-.22,.31],[-.05,.18],[.24,.06]];
const mlpUpdate=[[.02,.10,-.08,.10],[-.15,.20,.05,-.02],[.10,.20,-.40,.30]];
let step=0,prev=null;const focus=2,temp=1;
const el={count:document.getElementById('count'),mini:document.getElementById('mini'),title:document.getElementById('title'),explain:document.getElementById('explain'),workspace:document.getElementById('workspace'),diagram:document.getElementById('diagram'),progress:document.getElementById('progress'),prev:document.getElementById('prev'),next:document.getElementById('next')};
const fmt=n=>(n>=0?'+':'')+Number(n).toFixed(2);const dot=(a,b)=>+(a.reduce((s,x,i)=>s+x*b[i],0)).toFixed(2);const softmax=a=>{const m=Math.max(...a),ex=a.map(x=>Math.exp((x-m)/temp)),sum=ex.reduce((s,x)=>s+x,0);return ex.map(x=>+(x/sum).toFixed(2))};
function calc(){const scores=k.map(ki=>dot(q[focus],ki));const w=softmax(scores);const scaled=v.map((vi,i)=>vi.map(x=>+(x*w[i]).toFixed(2)));const mixed=[0,1].map(j=>+scaled.reduce((s,r)=>s+r[j],0).toFixed(2));const concat=[...mixed,...headB[focus]];const update=[+(concat[0]*.6+concat[2]*.4).toFixed(2),+(concat[1]*.5-concat[3]*.2).toFixed(2),+(concat[0]*.3-concat[1]*.4).toFixed(2),+(concat[2]*.2+concat[3]*.5).toFixed(2)];const allUpdate=words.map((_,i)=>i===focus?update:[.05,.03,-.10,.08]);const after=norm.map((r,i)=>r.map((n,j)=>+(n+allUpdate[i][j]).toFixed(2)));const out=after.map((r,i)=>r.map((n,j)=>+(n+mlpUpdate[i][j]).toFixed(2)));return{scores,w,scaled,mixed,concat,update,allUpdate,after,out}}
const steps=[
{kind:'vec',tag:'embed',t:'Token embeddings',e:'Each token starts as a learned vector. This toy uses 4 values.',v:()=>embed,d:['<strong>Input</strong><br>The cat sat','<strong>Shape</strong><br>3 × 4']},
{kind:'pair',tag:'position',t:'Add positional information',e:'A position vector is added so identical words in different places can have different representations.',a:embed,b:pos,out:x0,labels:['embedding','position','sum'],d:['<strong>Why</strong><br>attention itself has no order','<strong>Result</strong><br>block input x']},
{kind:'vec',tag:'norm(x)',t:'Normalize before attention',e:'Norm rescales each token vector before attention calculations.',v:()=>norm,d:['<strong>Input to attention</strong><br>still 3 token vectors','<strong>No token mixing</strong><br>just rescaled values']},
{kind:'qkv',tag:'Q K V',t:'Project into Q, K, V',e:'The same normalized vectors are multiplied by three learned matrices. Q and K feed scores. V feeds the weighted sum.'},
{kind:'single',tag:'dot',t:'Dot product for sat',e:'Focus token: sat. Its Q vector is dot-multiplied with every K vector.',items:()=>[[`Q_sat`,q[focus]],['K_The',k[0]],['K_cat',k[1]],['K_sat',k[2]]],math:()=>{const c=calc();return `Example: Q_sat·K_cat = (${fmt(q[focus][0])}×${fmt(k[1][0])}) + (${fmt(q[focus][1])}×${fmt(k[1][1])}) = ${fmt(c.scores[1])}`}},
{kind:'bars',tag:'softmax',t:'Scores become weights',e:'Softmax turns raw QK scores into coefficients that add up to about 1.',items:()=>[['scores',calc().scores],['weights',calc().w]],bars:()=>words.map((word,i)=>[word,Math.round(calc().w[i]*100)]),math:()=>`softmax([${calc().scores.map(fmt).join(', ')}]) = [${calc().w.map(fmt).join(', ')}]`},
{kind:'single',tag:'weights × V',t:'Weights scale the V vectors',e:'Each V vector is multiplied by its weight. These scaled vectors are the pieces that will be added.',items:()=>calc().scaled.map((r,i)=>[`${fmt(calc().w[i])}×V_${words[i]}`,r])},
{kind:'single',tag:'sum',t:'Scaled V vectors are summed',e:'The scaled V vectors are added into one 2-value result for sat in this attention head.',items:()=>[[`Head A mixed V for sat`,calc().mixed]],math:()=>calc().scaled.map(r=>`[${r.map(fmt)}]`).join(' + ')+' = ['+calc().mixed.map(fmt).join(', ')+']'},
{kind:'heads',tag:'multi-head',t:'Multi-head context',e:'A real layer has several heads in parallel. This demo computes Head A in detail and shows a second toy Head B beside it.'},
{kind:'single',tag:'Wo',t:'Concatenate heads, then project back',e:'Head outputs are concatenated, then multiplied by an output matrix Wo to return to the normal vector size.',items:()=>[[`concat heads for sat`,calc().concat],[`attention update for sat`,calc().update]],math:()=>`[Head A 2 values + Head B 2 values] → Wo → 4-value update`},
{kind:'vec',tag:'residual',t:'Residual add re-integrates attention',e:'The attention update is added back to the pre-attention residual stream.',v:()=>calc().after,math:()=>`sat: norm(x) + attention update = [${calc().after[focus].map(fmt).join(', ')}]`},
{kind:'vec',tag:'MLP',t:'MLP creates another update',e:'The MLP applies the same feed-forward network to each token independently.',v:()=>mlpUpdate,d:['<strong>MLP</strong><br>expand → activate → shrink','<strong>No token mixing</strong><br>per row only']},
{kind:'vec',tag:'output',t:'Final residual gives block output',e:'The MLP update is added back. This output goes to the next transformer block.',v:()=>calc().out,math:()=>`sat final vector = [${calc().out[focus].map(fmt).join(', ')}]`}
];
function cells(arr,cls=''){return `<div class="vec ${cls}">${arr.map(x=>`<div class="cell">${fmt(x)}</div>`).join('')}</div>`}
function vecCards(v,tag){return v.map((vec,i)=>`<article class="token"><div class="top"><div class="word">${words[i]}</div><div class="tag">${tag}</div></div><div class="vec">${vec.map((x,j)=>`<div class="cell ${prev&&prev[i]&&Math.abs(x-prev[i][j])>.001?'changed':''}">${fmt(x)}</div>`).join('')}</div></article>`).join('')}
function itemCards(items){return items.map(([name,arr])=>`<article class="mini"><div class="top"><div class="word">${name}</div><div class="tag">${arr.length} values</div></div>${cells(arr,arr.length===2?'two':arr.length===3?'three':'')}</article>`).join('')}
function qkvCards(){return `<div class="grid3">${[['Q',q,'accent'],['K',k,'good'],['V',v,'hot']].map(([name,data,cls])=>`<article class="mini"><div class="top"><div class="word ${cls}">${name}</div><div class="tag">3×2</div></div>${data.map((vec,i)=>`<div class="top"><span>${words[i]}</span>${cells(vec,'two')}</div>`).join('')}</article>`).join('')}</div><div class="mathline">Q/K/V are not mental states. They are separate projected matrices used in different calculations.</div>`}
function pairCards(s){return words.map((w,i)=>`<article class="token"><div class="top"><div class="word">${w}</div><div class="tag">${s.labels[0]} + ${s.labels[1]}</div></div>${cells(s.a[i])}<div class="mathline">+ position ${cells(s.b[i])}</div><div class="mathline">= ${cells(s.out[i])}</div></article>`).join('')}
function bars(b){return b.map(([name,p])=>`<article class="mini"><div class="top"><strong>${name}</strong><span>${p}%</span></div><div class="bar"><div class="fill" style="--w:${p}%"></div></div></article>`).join('')}
function headCards(){const c=calc();return `<div class="grid2"><article class="mini"><div class="top"><div class="word accent">Head A</div><div class="tag">computed</div></div>${cells(c.mixed,'two')}</article><article class="mini"><div class="top"><div class="word good">Head B</div><div class="tag">parallel toy head</div></div>${cells(headB[focus],'two')}</article></div><div class="mathline">Heads receive the same layer input, but have different learned Q/K/V projections. Their outputs are concatenated before Wo.</div>`}
function render(){const s=steps[step];el.count.textContent=`Step ${step+1}/${steps.length}`;el.mini.textContent=s.tag;el.title.textContent=s.t;el.explain.textContent=typeof s.e==='function'?s.e():s.e;let html='';if(s.kind==='vec')html=vecCards(s.v(),s.tag);if(s.kind==='pair')html=pairCards(s);if(s.kind==='qkv')html=qkvCards();if(s.kind==='single')html=itemCards(s.items());if(s.kind==='bars')html=itemCards(s.items())+bars(s.bars());if(s.kind==='heads')html=headCards();if(s.math)html+=`<div class="mathline">${typeof s.math==='function'?s.math():s.math}</div>`;el.workspace.innerHTML=html;el.diagram.innerHTML=(s.d||[]).map(x=>`<div class="node">${x}</div>`).join('');el.progress.innerHTML=steps.map((_,i)=>`<div class="pill ${i<=step?'on':''}"></div>`).join('');el.prev.disabled=step===0;el.next.textContent=step===steps.length-1?'Restart':'Next';prev=s.kind==='vec'?s.v():null}
el.next.onclick=()=>{step=step===steps.length-1?0:step+1;render()};el.prev.onclick=()=>{step=Math.max(0,step-1);render()};render();
</script></body></html>
